services:
  - type: web
    name: riego-ia-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: IRRIGATION_ADMIN_USER
        sync: false
      - key: IRRIGATION_ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://riego-ia-interfaz.onrender.com
      - key: DATA_DIR
        value: /app/data/raw
      - key: ARTIFACTS_DIR
        value: /app/artifacts
      - key: ALLOW_DOCS
        value: "false"

  - type: web
    name: riego-ia-interfaz
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps --no-audit --no-fund && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://riego-ia-api.onrender.com
